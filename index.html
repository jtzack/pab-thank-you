<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're On The Waitlist | Self-Publishing Studio</title>
  <meta name="description" content="You're on the waitlist for the Self-Publishing Studio. We'll be in touch when enrollment opens." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- PAB type roles: Cinzel (display), Space Grotesk (UI/body), Space Mono (system voice) -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Personal Agent Bootcamp design tokens ──
       Cool stone canvas, obsidian ink, laser-red charge. 2px ink borders,
       hard-offset "chiseled" shadows, tight corners, no gradients. */
    :root {
      /* Stone / cool marble */
      --stone-0: #FFFFFF;
      --stone-1: #F2F5F8;
      --stone-2: #E3E8EE;
      --stone-3: #CAD2DB;
      --stone-4: #A2ADB8;

      /* Obsidian / graphite (ink, inverse surfaces, every border) */
      --obsidian-0: #15181C;
      --obsidian-1: #21262C;
      --obsidian-2: #343B43;
      --obsidian-3: #565F69;
      --obsidian-4: #828C97;

      /* Laser red — the signature charge (live / interactive only) */
      --laser-glow: #FF3B30;
      --laser-1: #FF1E1E;
      --laser-2: #E10E0E;
      --laser-3: #B00808;
      --laser-4: #7A0606;

      /* Pop pastels (one per block) */
      --sky: #93CFE8;
      --blush: #F2A6AE;

      /* Semantic */
      --bg:           var(--stone-1);
      --surface:      var(--stone-0);
      --text-strong:  var(--obsidian-0);
      --text-body:    var(--obsidian-1);
      --text-muted:   var(--obsidian-3);
      --text-faint:   var(--obsidian-4);
      --accent:       var(--laser-2);

      /* Type */
      --font-display: 'Cinzel', 'Times New Roman', serif;
      --font-sans:    'Space Grotesk', system-ui, sans-serif;
      --font-mono:    'Space Mono', 'SF Mono', ui-monospace, monospace;

      /* Shape, border, shadow — the brand's skeleton */
      --radius-sm: 4px;
      --radius-md: 6px;
      --stroke-bold: 2px;
      --shadow-hard:    4px 4px 0 var(--obsidian-0);
      --shadow-hard-lg: 7px 7px 0 var(--obsidian-0);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--bg); }
    ::selection { background: var(--laser-2); color: #fff; }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      color: var(--text-body);
      min-height: 100vh;
      /* Flat cool-stone field — no gradients, no textures. */
      background: var(--bg);
      padding: 44px 20px 72px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
    }

    /* Riso halftone backdrop, in two layers so the dots stay a fixed, fine
       size no matter how tall the page gets (cover-scaling was ballooning
       them). Layer 1: a seamless fine dot-field tiled across the whole page.
       Layer 2: the stoic operator's head, sized in vw and bled off the top so
       the face reads right behind the headline and flanks the column. Scrolls
       with the page; opacity keeps it a backdrop under the crisp content. */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url('assets/statue-dots.png'), url('assets/dot-tile.png');
      background-repeat: no-repeat, repeat;
      background-position: center -28px, top left;
      background-size: min(720px, 82vw) auto, 9px 9px;
      opacity: 0.5;
    }

    .container {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      text-align: center;
      animation: fadeUp 0.45s var(--ease-out, cubic-bezier(0.22,1,0.36,1)) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Display headline (Cinzel, inscriptional caps) ─── */
    h1.display {
      font-family: var(--font-display);
      font-weight: 900;
      text-transform: uppercase;
      /* Sized in vw so the headline scales to stay on a single line
         instead of wrapping. */
      font-size: clamp(15px, 4.4vw, 38px);
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--text-strong);
      margin-bottom: 28px;
      white-space: nowrap;
    }

    /* Accent word carries the laser charge — solid, never a gradient */
    h1.display .accent { color: var(--laser-2); }

    /* ─── Sneak-peek card: stone surface, 2px ink, chiseled shadow ─── */
    .card {
      background: var(--surface);
      border: var(--stroke-bold) solid var(--obsidian-0);
      border-radius: var(--radius-md);
      padding: 36px 36px 34px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-hard-lg);
      text-align: center;
    }

    /* Mono eyebrow = the "system voice" — wide-tracked caps, // prefix */
    .card-eyebrow {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .card-eyebrow::before { content: "// "; }

    .card h2 {
      font-family: var(--font-display);
      font-weight: 800;
      text-transform: uppercase;
      font-size: clamp(20px, 3vw, 26px);
      line-height: 1.1;
      letter-spacing: 0.03em;
      color: var(--text-strong);
      margin-bottom: 12px;
    }

    .card p {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-body);
    }

    /* Bold-the-payoff: key phrase pulled out in ink */
    .card p strong {
      color: var(--text-strong);
      font-weight: 700;
    }

    /* Short copy is a mobile-only swap for the longer desktop sentence */
    .card p.short-copy { display: none; }

    /* The in-card headline is a mobile-only relocation of the hero */
    .display.hero-in-card { display: none; }

    /* ─── Survey embed: framed in 2px ink with a chiseled shadow ─── */
    .survey-section { margin-top: 8px; }

    .survey-embed {
      width: 100%;
      background: var(--obsidian-0);
      border: var(--stroke-bold) solid var(--obsidian-0);
      border-radius: var(--radius-md);
      height: 480px;
      overflow: hidden;
      box-shadow: var(--shadow-hard-lg);
    }

    .survey-embed iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Footer ─── */
    footer {
      margin-top: 44px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    footer .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    footer .wordmark .mark {
      width: 34px; height: 34px;
      border: 2px solid var(--obsidian-0);
      border-radius: var(--radius-sm);
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
    }
    footer .wordmark .mark .eye {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--laser-1);
      box-shadow: 0 0 6px rgba(255,59,48,0.9);
    }

    footer .wordmark .name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-strong);
    }

    @media (max-width: 640px) {
      /* Tighter chrome on phones so the form gets the lion's share of the screen */
      body { padding: 26px 16px 32px; }
      h1.display { margin-bottom: 18px; }
      .card { padding: 24px 18px 22px; margin-bottom: 18px; box-shadow: var(--shadow-hard); }
      .survey-embed { box-shadow: var(--shadow-hard); }

      /* Move the hero headline into the card; hide the standalone one. The
         card's padding leaves less width, so scale the nowrap headline down a
         hair to keep it on one line. */
      .display.hero-outer { display: none; }
      .display.hero-in-card { display: block; margin-bottom: 16px; font-size: clamp(13px, 4vw, 38px); }

      /* Trim the card on phones: swap in the short one-line copy, shrink heads. */
      .card p.long-copy { display: none; }
      .card p.short-copy { display: block; font-size: 15px; }

      /* Let the embed fill most of the viewport instead of a fixed height so
         Typeform's questions + button aren't cut off. dvh tracks the visible
         area as the mobile browser chrome shows/hides. */
      .survey-embed { height: 520px; height: 80dvh; min-height: 440px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Headline (desktop/tablet: above the card) -->
    <h1 class="display hero-outer">
      Boom! You're <span class="accent">on the waitlist.</span>
    </h1>

    <!-- Sneak-peek card -->
    <div class="card">
      <!-- Mobile-only: headline moves inside the card -->
      <h1 class="display hero-in-card">
        Boom! You're <span class="accent">on the waitlist.</span>
      </h1>
      <div class="card-eyebrow">In the meantime</div>
      <h2>Want a sneak peek?</h2>
      <p class="long-copy">Answer <strong>3 quick questions</strong> and we'll give you a free sneak peek.</p>
      <p class="short-copy">Answer <strong>3 quick questions</strong> and we'll send it over.</p>
    </div>

    <!-- Typeform survey -->
    <div class="survey-section">
      <div class="survey-embed">
        <iframe id="typeform-embed" title="Sneak Peek Form" allow="camera; microphone; autoplay; encrypted-media;"></iframe>
      </div>
    </div>

    <footer>
      <div class="wordmark">
        <span class="mark"><span class="eye"></span><span class="eye"></span></span>
        <span class="name">Personal Agent Bootcamp</span>
      </div>
      &copy; 2026 Personal Agent Bootcamp. All rights reserved.
    </footer>
  </div>

  <script>
    // Parse email manually so literal "+" survives (URLSearchParams would turn it into a space)
    function readEmail(source) {
      var match = source.match(/(?:^|[?&#])email=([^&]*)/);
      if (!match) return '';
      try { return decodeURIComponent(match[1]); } catch (e) { return match[1]; }
    }
    var email = readEmail(window.location.hash) || readEmail(window.location.search) || 'xxxxx';
    var typeformId = 'EwktNZ7Z';
    var src = 'https://form.typeform.com/to/' + typeformId + '#email=' + encodeURIComponent(email);
    document.getElementById('typeform-embed').src = src;
  </script>
</body>
</html>
