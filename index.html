<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're On The Waitlist | Self-Publishing Studio</title>
  <meta name="description" content="You're on the waitlist for the Self-Publishing Studio. We'll be in touch when enrollment opens." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- PAB type role: JetBrains Mono across the board (display, UI/body, system voice) -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Personal Agent Bootcamp design tokens ──
       Warm paper canvas, near-black ink, electric-lime charge. 2px ink borders,
       hard-offset "chiseled" shadows, tight corners, no gradients. */
    :root {
      /* Paper / warm neutral */
      --paper-0: #FFFFFF;
      --paper-1: #F1EEEA;
      --paper-2: #E4E0DA;
      --paper-3: #CFC9C1;
      --paper-4: #A8A29A;

      /* Ink / graphite (text, inverse surfaces, every border) */
      --ink-0: #0D0F0E;
      --ink-1: #232726;
      --ink-2: #3A3E3D;
      --ink-3: #5C615F;
      --ink-4: #8A8F8C;

      /* Electric lime — the signature charge (buttons / accents) */
      --lime-1: #E6FF6B;
      --lime-2: #DCFF48;
      --lime-3: #C2E62E;
      --lime-4: #9CBF1E;

      /* Semantic */
      --bg:           var(--paper-1);
      --surface:      var(--paper-0);
      --text-strong:  var(--ink-0);
      --text-body:    var(--ink-1);
      --text-muted:   var(--ink-3);
      --text-faint:   var(--ink-4);
      --accent:       var(--lime-2);
      --on-accent:    var(--ink-0);

      /* Type — one mono voice */
      --font-display: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      --font-sans:    'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      --font-mono:    'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

      /* Shape, border, shadow — the brand's skeleton */
      --radius-sm: 4px;
      --radius-md: 6px;
      --stroke-bold: 2px;
      --shadow-hard:    4px 4px 0 var(--ink-0);
      --shadow-hard-lg: 7px 7px 0 var(--ink-0);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: var(--bg); }
    ::selection { background: var(--accent); color: var(--on-accent); }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      color: var(--text-body);
      min-height: 100vh;
      /* Flat warm-paper field — no gradients, no textures. */
      background: var(--bg);
      padding: 44px 20px 72px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
    }

    /* Riso halftone backdrop — one even, fine, light dot screen of the stoic
       operator. Constrained to a centered band (~the model's artboard width)
       so the statue stays a consistent size RELATIVE TO THE CONTENT on any
       screen — it no longer balloons on wide desktops. The source PNG is tall
       (statue at top, dot field baked down) so cover binds by width, keeping
       the dots fine at any page length. The statue is baked slightly left so
       his nose and one sunglasses lens peek into the left margin, the lens at
       the sneak card's middle; hair sits behind the headline. Light opacity. */
    body::before {
      content: "";
      position: absolute;
      top: 28px;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(100% - 56px, 1040px);   /* gutter on the sides; capped like the artboard */
      z-index: 0;
      pointer-events: none;
      background-image: url('assets/statue-halftone.png');
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
      opacity: 0.28;
    }

    .container {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      text-align: center;
      animation: fadeUp 0.45s var(--ease-out, cubic-bezier(0.22,1,0.36,1)) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Display headline (JetBrains Mono, machine caps) ─── */
    h1.display {
      font-family: var(--font-display);
      font-weight: 800;
      text-transform: uppercase;
      /* Sized in vw so the headline scales to stay on a single line
         instead of wrapping. Mono is wider than the old serif, so the
         ceiling is a touch lower and the tracking tighter to fit. */
      font-size: clamp(13px, 3.9vw, 32px);
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text-strong);
      margin-bottom: 28px;
      white-space: nowrap;
    }

    /* Accent word carries the lime charge — a highlighter swipe behind the
       ink text, so it reads on the light canvas and adds no extra width. */
    h1.display .accent {
      color: var(--text-strong);
      box-shadow: inset 0 -0.30em 0 var(--accent);
    }

    /* ─── Sneak-peek card: paper surface, 2px ink, chiseled shadow ─── */
    .card {
      background: var(--surface);
      border: var(--stroke-bold) solid var(--ink-0);
      border-radius: var(--radius-md);
      padding: 36px 36px 34px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-hard-lg);
      text-align: center;
    }

    /* Mono eyebrow = the "system voice" — a lime tag, dark ink, // prefix.
       Lime is a background here (not text) so it reads on the light card. */
    .card-eyebrow {
      display: inline-block;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--on-accent);
      background: var(--accent);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
    }
    .card-eyebrow::before { content: "// "; }

    .card h2 {
      font-family: var(--font-display);
      font-weight: 800;
      text-transform: uppercase;
      font-size: clamp(20px, 3vw, 26px);
      line-height: 1.1;
      letter-spacing: 0.03em;
      color: var(--text-strong);
      margin-bottom: 12px;
    }

    .card p {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-body);
    }

    /* Bold-the-payoff: key phrase pulled out in ink */
    .card p strong {
      color: var(--text-strong);
      font-weight: 700;
    }

    /* Short copy is a mobile-only swap for the longer desktop sentence */
    .card p.short-copy { display: none; }

    /* The in-card headline is a mobile-only relocation of the hero */
    .display.hero-in-card { display: none; }

    /* ─── Survey embed: framed in 2px ink with a chiseled shadow ─── */
    .survey-section { margin-top: 8px; }

    .survey-embed {
      width: 100%;
      background: var(--ink-0);
      border: var(--stroke-bold) solid var(--ink-0);
      border-radius: var(--radius-md);
      height: 480px;
      overflow: hidden;
      box-shadow: var(--shadow-hard-lg);
    }

    .survey-embed iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Footer ─── */
    footer {
      margin-top: 44px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    footer .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    footer .wordmark .mark {
      width: 34px; height: 34px;
      border: 2px solid var(--ink-0);
      border-radius: var(--radius-sm);
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
    }
    footer .wordmark .mark .eye {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(220,255,72,0.9);
    }

    footer .wordmark .name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-strong);
    }

    @media (max-width: 640px) {
      /* Tighter chrome on phones so the form gets the lion's share of the screen */
      body { padding: 26px 16px 32px; }
      h1.display { margin-bottom: 18px; }
      .card { padding: 24px 18px 22px; margin-bottom: 18px; box-shadow: var(--shadow-hard); }
      .survey-embed { box-shadow: var(--shadow-hard); }

      /* Move the hero headline into the card; hide the standalone one. The
         card's padding leaves less width, so scale the nowrap headline down a
         hair to keep it on one line. */
      .display.hero-outer { display: none; }
      .display.hero-in-card { display: block; margin-bottom: 16px; font-size: clamp(13px, 4vw, 38px); }

      /* Trim the card on phones: swap in the short one-line copy, shrink heads. */
      .card p.long-copy { display: none; }
      .card p.short-copy { display: block; font-size: 15px; }

      /* Let the embed fill most of the viewport instead of a fixed height so
         Typeform's questions + button aren't cut off. dvh tracks the visible
         area as the mobile browser chrome shows/hides. */
      .survey-embed { height: 520px; height: 80dvh; min-height: 440px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Headline (desktop/tablet: above the card) -->
    <h1 class="display hero-outer">
      Boom! You're <span class="accent">on the waitlist.</span>
    </h1>

    <!-- Sneak-peek card -->
    <div class="card">
      <!-- Mobile-only: headline moves inside the card -->
      <h1 class="display hero-in-card">
        Boom! You're <span class="accent">on the waitlist.</span>
      </h1>
      <div class="card-eyebrow">In the meantime</div>
      <h2>Want a sneak peek?</h2>
      <p class="long-copy">Answer <strong>3 quick questions</strong> and we'll give you a free sneak peek.</p>
      <p class="short-copy">Answer <strong>3 quick questions</strong> and we'll send it over.</p>
    </div>

    <!-- Typeform survey -->
    <div class="survey-section">
      <div class="survey-embed">
        <iframe id="typeform-embed" title="Sneak Peek Form" allow="camera; microphone; autoplay; encrypted-media;"></iframe>
      </div>
    </div>

    <footer>
      <div class="wordmark">
        <span class="mark"><span class="eye"></span><span class="eye"></span></span>
        <span class="name">Personal Agent Bootcamp</span>
      </div>
      &copy; 2026 Personal Agent Bootcamp. All rights reserved.
    </footer>
  </div>

  <script>
    // Parse email manually so literal "+" survives (URLSearchParams would turn it into a space)
    function readEmail(source) {
      var match = source.match(/(?:^|[?&#])email=([^&]*)/);
      if (!match) return '';
      try { return decodeURIComponent(match[1]); } catch (e) { return match[1]; }
    }
    var email = readEmail(window.location.hash) || readEmail(window.location.search) || 'xxxxx';
    var typeformId = 'EwktNZ7Z';
    var src = 'https://form.typeform.com/to/' + typeformId + '#email=' + encodeURIComponent(email);
    document.getElementById('typeform-embed').src = src;
  </script>
</body>
</html>
